<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="志强果业167号">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a5632">
    <meta name="app-version" content="v3.20260716">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <title>志强果业167号 - 电子票据</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --green: #1a5632;
            --green-light: #eaf5ed;
            --red: #c0392b;
            --text: #1a1a1a;
            --text-secondary: #666;
            --border: #dde1e4;
            --bg: #eef0f2;
            --card-bg: #fff;
            --radius: 12px;
            --input-bg: #f7f8f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            padding-top: env(safe-area-inset-top, 0px);
        }

        /* ================================================ */
        /*  NORMAL MODE                                     */
        /* ================================================ */
        .app-shell {
            max-width: 500px;
            margin: 0 auto;
            padding: calc(env(safe-area-inset-top, 8px) + 10px) 12px 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ---- Top bar ---- */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }
        .topbar-brand {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--green);
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .topbar-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .market-input {
            padding: 0 8px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-size: 0.8rem;
            font-family: inherit;
            background: #fff;
            color: var(--text);
            height: 42px;
            width: 100px;
        }
        .date-input {
            padding: 0 8px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-size: 0.85rem;
            font-family: inherit;
            background: #fff;
            color: var(--text);
            height: 42px;
            width: 130px;
        }
        /* ---- WeChat row ---- */
        .wechat-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border-radius: 8px;
            padding: 6px 12px;
            border: 1.5px solid var(--border);
        }
        .wechat-row label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .wechat-row input {
            flex: 1;
            border: none;
            font-size: 0.88rem;
            font-family: inherit;
            color: var(--text);
            background: transparent;
            outline: none;
            height: 42px;
            min-width: 0;
        }
        .wechat-row input::placeholder { color: #bbb; }

        /* ---- Order area (buttons fixed top, tags grid below) ---- */
        .order-area {
            flex: 1;
            min-width: 0;
        }
        .order-btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
        }
        .order-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }
        .order-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 6px 10px;
            background: #f0f2f3;
            color: #888;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.12s, color 0.12s;
        }
        .order-tag > span {
            white-space: nowrap;
        }
        .order-num {
            font-size: 0.65rem;
            font-weight: 400;
            opacity: 0.5;
        }
        .order-tag:active { background: #e5e7e9; }
        .order-tag.active {
            background: var(--green-light);
            color: var(--green);
        }
        .order-tag .tag-close {
            font-size: 0.9rem;
            opacity: 0.4;
            margin-left: 1px;
            line-height: 1;
            flex-shrink: 0;
        }
        .order-tag.active .tag-close { opacity: 0.65; }
        .order-tag .tag-close:active { opacity: 1; color: var(--red); }
        .order-grid-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            transition: background 0.12s;
            border: none;
        }
        .order-grid-btn.add-btn {
            background: transparent;
            color: var(--green);
            border: 1.5px dashed var(--green);
        }
        .order-grid-btn.add-btn:active { background: #eaf5ed; }
        .order-grid-btn.clear-all-btn {
            background: transparent;
            color: #c0392b;
            border: 1.5px dashed #e0c0c0;
        }
        .order-grid-btn.clear-all-btn:active { background: #fdf0f0; }

        /* ---- Customer Autocomplete ---- */
        .customer-autocomplete {
            position: relative;
            flex: 1;
            min-width: 0;
        }
        .customer-autocomplete input {
            width: 100%;
            border: none;
            font-size: 0.88rem;
            font-family: inherit;
            color: var(--text);
            background: transparent;
            outline: none;
            height: 42px;
        }
        .customer-autocomplete input::placeholder { color: #bbb; }
        .customer-dropdown {
            position: absolute;
            top: calc(100% + 2px);
            left: -12px;
            right: -12px;
            max-height: 260px;
            overflow-y: auto;
            background: #fff;
            border: 2px solid var(--green);
            border-radius: 10px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.14);
            z-index: 200;
            display: none;
            list-style: none;
            margin: 0;
            padding: 6px 0;
            -webkit-overflow-scrolling: touch;
        }
        .customer-dropdown.show { display: block; }
        .customer-dropdown li {
            padding: 11px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.12s;
            color: var(--text);
            user-select: none;
            -webkit-user-select: none;
        }
        .customer-dropdown li + li { border-top: 1px solid #f2f3f4; }
        .customer-dropdown li:hover,
        .customer-dropdown li.active {
            background: #e8f5e9;
            color: #0d3d1f;
            font-weight: 600;
        }
        .customer-dropdown li .hl {
            color: var(--green);
            font-weight: 700;
        }
        .customer-dropdown .no-match {
            padding: 14px 16px;
            color: #aaa;
            text-align: center;
            font-size: 0.84rem;
            cursor: default;
        }

        /* ---- Product name autocomplete dropdown (fixed position, shared) ---- */
        .product-dropdown {
            position: fixed;
            max-height: 240px;
            overflow-y: auto;
            background: #fff;
            border: 2px solid var(--green);
            border-radius: 10px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.15);
            z-index: 9999;
            display: none;
            list-style: none;
            margin: 0;
            padding: 6px 0;
            -webkit-overflow-scrolling: touch;
            min-width: 120px;
        }
        .product-dropdown.show { display: block; }
        .product-dropdown li {
            padding: 11px 16px;
            font-size: 0.88rem;
            cursor: pointer;
            transition: background 0.12s;
            color: var(--text);
            user-select: none;
            -webkit-user-select: none;
            white-space: nowrap;
        }
        .product-dropdown li + li { border-top: 1px solid #f2f3f4; }
        .product-dropdown li:hover,
        .product-dropdown li.active {
            background: #e8f5e9;
            color: #0d3d1f;
            font-weight: 600;
        }
        .product-dropdown li .hl {
            color: var(--green);
            font-weight: 700;
        }
        .product-dropdown .no-match {
            padding: 14px 16px;
            color: #aaa;
            text-align: center;
            font-size: 0.84rem;
            cursor: default;
        }
        .static-phone {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--green);
            letter-spacing: 0.5px;
        }

        /* ---- Product input cards ---- */
        .input-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 12px 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            border: 1.5px solid transparent;
            transition: border-color 0.2s;
        }
        .input-card:focus-within { border-color: var(--green); }
        .input-card-header {
            font-size: 1rem;
            font-weight: 700;
            color: var(--green);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-card-header .icon { font-size: 1.2rem; }
        .pieces-inline {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .pieces-inline input {
            width: 58px;
            height: 42px;
            padding: 2px 4px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-family: inherit;
            font-size: 0.9rem;
            text-align: center;
            background: #fff;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s;
        }
        .pieces-inline input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 2px rgba(26,86,50,0.08);
        }
        .pieces-inline input::placeholder { color: #c5c9cc; font-size: 0.75rem; }

        /* ---- 特价 toggle ---- */
        .special-chk-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }
        /* 隐藏原生checkbox */
        .special-chk-wrap input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }
        /* 自定义方框 — 高度与输入框一致 */
        .special-chk-wrap .chk-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 42px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            background: #fff;
            margin-right: 2px;
            flex-shrink: 0;
            transition: border-color 0.15s, background 0.15s;
        }
        /* 选中态 — 绿色边框+浅绿底+打勾 */
        .special-chk-wrap input:checked + .chk-box {
            border-color: var(--green);
            background: #e8f5e9;
        }
        .special-chk-wrap input:checked + .chk-box::after {
            content: '✓';
            color: var(--green);
            font-size: 18px;
            font-weight: 800;
            line-height: 1;
        }
        /* focus时方框高亮 */
        .special-chk-wrap input:focus-visible + .chk-box {
            box-shadow: 0 0 0 2px rgba(26,86,50,0.1);
        }
        .special-badge {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 700;
            color: #fff;
            background: #e67e22;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 3px;
            vertical-align: middle;
            line-height: 1.4;
        }

        /* Table inside card */
        .card-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }
        .card-table thead th {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            padding: 0 4px 4px;
            letter-spacing: 0.3px;
            line-height: 1.2;
            white-space: nowrap;
        }
        .card-table thead th.th-special {
            width: 42px;
        }
        .card-table thead th.th-amt {
            width: 80px;
        }
        .card-table .label-col {
            font-size: 0.78rem;
            color: #888;
            white-space: nowrap;
            text-align: right;
            padding-right: 4px;
            font-weight: 500;
        }

        /* ---- Unified table inputs (all cards) ---- */
        .card-table input {
            box-sizing: border-box;
            width: 100%;
            height: 42px;
            padding: 0 4px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-family: inherit;
            font-size: 0.95rem;
            text-align: center;
            background: #fff;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s;
        }
        .card-table input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 2px rgba(26,86,50,0.08);
        }
        .card-table input::placeholder { color: #c5c9cc; font-size: 0.78rem; }

        /* Result cell — matches input dimensions */
        .card-table .result {
            box-sizing: border-box;
            width: 100%;
            height: 42px;
            padding: 0 4px;
            border: 1.5px solid transparent;
            border-radius: 7px;
            font-family: inherit;
            font-size: 0.95rem;
            text-align: center;
            background: #f4f7f5;
            font-weight: 700;
            color: var(--green);
            line-height: 42px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
        }
        .card-table .result.empty {
            color: #bbb;
            font-weight: 400;
            background: #fafbfb;
        }

        /* Table cell — consistent row height */
        .card-table tbody td {
            padding: 0 3px;
            height: 50px;
            vertical-align: middle;
        }
        .card-table tbody td:first-child { padding-left: 0; }
        .card-table tbody td:last-child { padding-right: 0; }

        /* ---- Grand total ---- */
        .grand-total-bar {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            border: 1.5px solid var(--green);
        }
        .grand-total-bar .label {
            font-size: 1rem;
            font-weight: 700;
            color: var(--green);
        }
        .grand-total-bar .value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--red);
        }

        /* ---- Buttons ---- */
        .btn-generate {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            letter-spacing: 2px;
            cursor: pointer;
            min-height: 52px;
            box-shadow: 0 2px 8px rgba(26,86,50,0.25);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-generate:active {
            transform: scale(0.98);
            box-shadow: 0 1px 4px rgba(26,86,50,0.2);
        }
        .btn-clear {
            display: block;
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #999;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            min-height: 42px;
            margin-top: -4px;
        }
        .btn-clear:active { background: #f5f5f5; color: #666; }

        /* ---- Receipt (in normal mode) ---- */
        .receipt-section { margin-top: 8px; }
        .receipt-section-label {
            text-align: center;
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        /* ================================================ */
        /*  RECEIPT CARD  (shared by both modes)            */
        /* ================================================ */
        .receipt {
            background: #fff;
            padding: 28px 20px 20px;
            font-size: 0.85rem;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            border: 1px solid #e8e8e8;
        }
        /* Market name — smallest, centered */
        .receipt-market-name {
            text-align: center;
            font-size: 0.68rem;
            color: #999;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        /* Store name — large bold centered */
        .receipt-store-name {
            text-align: center;
            font-size: 1.65rem;
            font-weight: 800;
            color: var(--green);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        /* Info row: customer left, code+date right */
        .receipt-info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2px;
        }
        .receipt-customer {
            font-size: 1.25rem;
            font-weight: 700;
            color: #111;
            text-align: left;
        }
        .receipt-code-date {
            font-size: 0.9rem;
            font-weight: 500;
            color: #555;
            text-align: right;
            white-space: nowrap;
        }
        .receipt-code-date .code-num {
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .receipt-divider {
            border: none;
            border-top: 1px dashed #d0d0d0;
            margin: 12px 0;
        }

        /* Receipt table */
        .receipt-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
            font-size: 0.95rem;
            table-layout: fixed;
        }
        .receipt-table thead th {
            background: #f5f5f5;
            padding: 7px 6px;
            font-weight: 700;
            border-bottom: 2px solid #ddd;
            font-size: 0.8rem;
            color: #555;
            white-space: nowrap;
        }
        .receipt-table thead th.h-left { text-align: left; padding-left: 8px; }
        .receipt-table thead th.h-center { text-align: center; }
        .receipt-table thead th.h-right { text-align: right; padding-right: 8px; }
        .receipt-table tbody td {
            padding: 8px 6px;
            text-align: center;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        .receipt-table .name-col {
            font-weight: 700;
            color: var(--green);
            text-align: left;
            padding-left: 8px;
            font-size: 1.0rem;
        }
        .receipt-table .num-col { text-align: center; }
        .receipt-table .amt-col { text-align: right; padding-right: 8px; font-weight: 700; font-size: 0.98rem; }
        .receipt-table .price-wrap { display: inline-block; }
        .receipt-table .price-wrap .special-badge {
            display: block;
            font-size: 0.55rem;
            line-height: 1;
            margin-top: 1px;
        }
        .receipt-table .total-row td {
            font-weight: 700;
            font-size: 1.1rem;
            border-top: 2px solid #ddd;
            border-bottom: none;
            padding: 10px 4px;
        }
        .receipt-table .total-row .total-label { text-align: right; padding-right: 10px; }
        .receipt-table .total-row .total-val { text-align: right; padding-right: 8px; }
        /* Basket info row */
        .receipt-table .basket-info td {
            text-align: left;
            padding: 8px 8px;
            font-size: 0.92rem;
            font-weight: 600;
            color: #555;
            border-bottom: 1px solid #eee;
        }

        /* ---- Product section card in receipt ---- */
        .receipt-product-section {
            margin-bottom: 10px;
            border: 1.5px solid #dde1e4;
            border-radius: 8px;
            overflow: hidden;
        }
        .receipt-product-header {
            background: #f7f8f9;
            padding: 8px 10px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--green);
            border-bottom: 1px solid #e8e8e8;
            letter-spacing: 0.5px;
        }
        .receipt-product-section .receipt-table {
            margin-top: 0;
            margin-bottom: 0;
        }
        .receipt-product-section .receipt-table thead th {
            background: #fafbfb;
        }
        /* 货品合计 footer bar — matching frame-total style */
        .receipt-product-total {
            background: #fafbfb;
            border-top: 1px solid #e8e8e8;
            padding: 9px 10px;
            text-align: right;
            font-size: 1.0rem;
            font-weight: 700;
            color: #555;
        }

        /* ---- Frame section (去框/来框) in receipt ---- */
        .receipt-frame-section {
            margin-top: 10px;
            border: 1.5px solid #dde1e4;
            border-radius: 8px;
            overflow: hidden;
        }
        .receipt-frame-header {
            background: #f7f8f9;
            padding: 8px 10px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--green);
            border-bottom: 1px solid #e8e8e8;
            letter-spacing: 0.5px;
        }
        .receipt-frame-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 10px;
            font-size: 0.92rem;
            color: #555;
            font-weight: 500;
        }
        .receipt-frame-row + .receipt-frame-row {
            border-top: 1px solid #f2f3f4;
        }
        .receipt-frame-row .frame-label {
            font-weight: 600;
        }
        .receipt-frame-row .frame-detail {
            color: #888;
            font-size: 0.84rem;
        }
        .receipt-frame-row .frame-amt {
            font-weight: 700;
            min-width: 60px;
            text-align: right;
        }
        .receipt-frame-row .frame-amt.negative {
            color: var(--red);
        }

    <script>
    (function() {
        const ROWS = ['banana', 'pink-banana'];

        const otherTableWrap = document.getElementById('otherTableWrap');
        const otherEmpty = document.getElementById('otherEmpty');

        // ===== Multi-Order Management =====
        let orders = [];
        let activeOrderId = null;

        function createOrderId() {
            return 'ord_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        }
        function newOrderData() {
            return {
                id: createOrderId(),
                customer: '',
                date: todayStr(),
                banana: { pieces: '', weight: '', price: getRememberedPrice('香蕉'), special: false },
                'pink-banana': { pieces: '', weight: '', price: getRememberedPrice('粉蕉'), special: false },
                otherCount: '',
                otherItems: [],
                lai: '', qu: '', laiCount: '', quCount: ''
            };
        }
        // ===== Remembered prices =====
        function rememberPrice(name, price) {
            if (name && price !== null && price !== undefined && price !== '') {
                localStorage.setItem('zq_price_' + name, price);
            }
        }
        function getRememberedPrice(name) {
            return localStorage.getItem('zq_price_' + name) || '';
        }

        function getActiveOrder() {
            for (var _i = 0; _i < orders.length; _i++) {
                if (orders[_i].id === activeOrderId) return orders[_i];
            }
            return null;
        }
        function saveFormToOrder() {
            var order = getActiveOrder();
            if (!order) return;
            ROWS.forEach(function(row) {
                var spChk = document.querySelector('input[type="checkbox"][data-row="' + row + '"][data-field="special"]');
                order[row] = { pieces: val(row,'pieces'), weight: val(row,'weight'), price: val(row,'price'), special: spChk ? spChk.checked : false };
            });
            order.otherCount = otherCountEl.value;
            order.otherItems = getOtherItemsRaw();
            order.lai = document.getElementById('inputLai').value;
            order.qu = document.getElementById('inputQu').value;
            order.laiCount = document.getElementById('inputLaiCount').value;
            order.quCount = document.getElementById('inputQuCount').value;
            order.customer = customerInput.value;
            order.date = dateInput.value;
        }
        function loadOrderToForm(order) {
            if (!order) return;
            ROWS.forEach(function(row) {
                var d = order[row] || {};
                setVal(row, 'pieces', d.pieces || '');
                setVal(row, 'weight', d.weight || '');
                setVal(row, 'price', d.price || '');
                var spChk = document.querySelector('input[type="checkbox"][data-row="' + row + '"][data-field="special"]');
                if (spChk) spChk.checked = !!d.special;
            });
            otherCountEl.value = order.otherCount || '';
            generateOtherRows(parseInt(order.otherCount) || 0);
            if (order.otherItems) restoreOtherItems(order.otherItems);
            document.getElementById('inputLai').value = order.lai || '';
            document.getElementById('inputQu').value = order.qu || '';
            document.getElementById('inputLaiCount').value = order.laiCount || '';
            document.getElementById('inputQuCount').value = order.quCount || '';
            customerInput.value = order.customer || '';
            dateInput.value = order.date || todayStr();
        }
        function persistOrders() {
            localStorage.setItem('zq_orders', JSON.stringify(orders));
            localStorage.setItem('zq_activeOrderId', activeOrderId || '');
        }
        function getOrderDisplayName(order) {
            return (order.customer && order.customer.trim()) ? order.customer.trim() : '未命名';
        }
        function renderTabs() {
            var container = document.getElementById('orderBar');
            if (!container) return;
            var html = '';
            // Order tags with sequential numbers (start from row 2, row 1 is buttons)
            for (var _j = 0; _j < orders.length; _j++) {
                var o = orders[_j];
                var name = getOrderDisplayName(o);
                var cls = o.id === activeOrderId ? ' active' : '';
                var closeBtn = orders.length > 1
                    ? '<span class="tag-close" data-delete="' + o.id + '">&times;</span>'
                    : '';
                html += '<span class="order-tag' + cls + '" data-id="' + o.id + '">' +
                    '<span><small class="order-num">' + (_j + 1) + '.</small> ' + name + '</span>' + closeBtn +

            container.innerHTML = html;

            // Bind order tag clicks
            var tags = container.querySelectorAll('.order-tag');
            for (var _k = 0; _k < tags.length; _k++) {
                tags[_k].addEventListener('click', function(e) {
                    if (e.target.classList.contains('tag-close')) {

            }
        }
        function switchOrder(id) {
            if (id === activeOrderId) return;
            saveFormToOrder();
            activeOrderId = id;
            var order = getActiveOrder();
            if (order) loadOrderToForm(order);
            renderTabs();
            persistOrders();

                return;

                if (!ok) return;
                // Keep only the first order, reset it
                var first = orders[0];
                first.customer = '';
                first.date = '';
                first.market = '';
                for (var key in first.rows) {
                    if (first.rows.hasOwnProperty(key)) {
                        first.rows[key] = { pieces: '', weight: '', price: '', special: false };

                first.otherItems = [];
                first.lai = '';
                first.qu = '';

                persistOrders();

        function deleteOrder(id) {
            if (orders.length <= 1) {

            }
            var target = null;
            for (var _n = 0; _n < orders.length; _n++) {
                if (orders[_n].id === id) { target = orders[_n]; break; }
            }
            var name = target ? getOrderDisplayName(target) : '未命名';
            showConfirm('确定删除订单"' + name + '"？').then(function(ok) {
                if (!ok) return;
                var kept = [];
                for (var _m = 0; _m < orders.length; _m++) {
                    if (orders[_m].id !== id) kept.push(orders[_m]);
                }
                orders = kept;
                if (activeOrderId === id) {

        function getPinyinInitials(name) {
            var result = '';
            for (var i = 0; i < name.length; i++) {
                var ch = name.charAt(i);
                if (/[a-zA-Z0-9]/.test(ch)) { result += ch.toUpperCase(); }
                else if (PINYIN_MAP[ch]) { result += PINYIN_MAP[ch]; }
                // 如果映射表中没有该字，跳过
            }
            return result;
        }

        function filterCustomers(query) {
            if (!query) return CUSTOMER_LIST.slice();
            var q = query.trim();
            var lowerQ = q.toLowerCase();
            var upperQ = q.toUpperCase();
            // 提取查询的拼音首字母（如果输入的是中文）
            var qPinyin = getPinyinInitials(q);

            return CUSTOMER_LIST.filter(function(name) {
                if (name.indexOf(q) !== -1) return true;                    // 中文子串
                if (name.toLowerCase().indexOf(lowerQ) !== -1) return true; // 英文/数字子串
                var namePinyin = getPinyinInitials(name);
                if (qPinyin && namePinyin.indexOf(qPinyin) !== -1) return true; // 拼音首字母
                return false;
            });
        }

        var dropdownEl = document.getElementById('customerDropdown');
        var dropdownVisible = false;
        var activeIndex = -1;

        function renderDropdown(matches) {
            dropdownEl.innerHTML = '';
            activeIndex = -1;
            if (matches.length === 0) {
                dropdownEl.innerHTML = '<li class="no-match">未找到匹配客户</li>';
                return;
            }
            var query = customerInput.value.trim().toLowerCase();
            for (var i = 0; i < matches.length; i++) {
                var li = document.createElement('li');
                li.setAttribute('data-index', i);
                li.textContent = matches[i];
                // 高亮匹配部分（简单实现）
                if (query && matches[i].toLowerCase().indexOf(query) !== -1) {
                    var idx = matches[i].toLowerCase().indexOf(query);
                    var before = matches[i].substring(0, idx);
                    var match = matches[i].substring(idx, idx + query.length);
                    var after = matches[i].substring(idx + query.length);
                    li.innerHTML = before + '<span class="hl">' + match + '</span>' + after;
                }
                li.addEventListener('click', function() {
                    var name = this.textContent;
                    selectCustomer(name);
                });
                li.addEventListener('mouseenter', function() {
                    setActive(parseInt(this.getAttribute('data-index')));
                });
                dropdownEl.appendChild(li);
            }
        }

        function showDropdown() {
            dropdownEl.classList.add('show');
            dropdownVisible = true;
        }

        function hideDropdown() {
            dropdownEl.classList.remove('show');
            dropdownVisible = false;
            activeIndex = -1;
        }

        function setActive(index) {
            var items = dropdownEl.querySelectorAll('li:not(.no-match)');
            for (var i = 0; i < items.length; i++) {
                items[i].classList.remove('active');
            }
            activeIndex = index;
            if (index >= 0 && index < items.length) {
                items[index].classList.add('active');
                // 滚动到可见区域
                items[index].scrollIntoView({ block: 'nearest' });
            }
        }

        function selectCustomer(name) {
            customerInput.value = name;
            hideDropdown();
            update();
        }

        // 初始化客户输入框
        customerInput.addEventListener('input', function() {
            var val = this.value;
            var matches = filterCustomers(val);
            renderDropdown(matches);
            if (matches.length > 0) {
                showDropdown();
            } else if (!val) {
                // 空输入时显示全部
                renderDropdown(CUSTOMER_LIST.slice());
                showDropdown();
            } else {
                // 有输入但无匹配，也显示（会显示"未找到"）
                showDropdown();
            }
        });

        customerInput.addEventListener('focus', function() {
            var val = this.value;
            var matches = filterCustomers(val);
            if (matches.length === 0 && !val) {
                renderDropdown(CUSTOMER_LIST.slice());
            } else {
                renderDropdown(matches);
            }
            if (CUSTOMER_LIST.length > 0 || val) showDropdown();
        });

        customerInput.addEventListener('blur', function() {
            // 延迟隐藏，让点击事件先触发
            setTimeout(function() { hideDropdown(); }, 250);
        });

        customerInput.addEventListener('keydown', function(e) {
            var items = dropdownEl.querySelectorAll('li:not(.no-match)');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (!dropdownVisible) {
                    var matches = filterCustomers(this.value);
                    renderDropdown(matches.length > 0 ? matches : CUSTOMER_LIST.slice());
                    showDropdown();
                }
                var next = activeIndex + 1;
                if (next >= items.length) next = 0;
                setActive(next);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (!dropdownVisible) {
                    var matches = filterCustomers(this.value);
                    renderDropdown(matches.length > 0 ? matches : CUSTOMER_LIST.slice());
                    showDropdown();
                }
                var prev = activeIndex - 1;
                if (prev < 0) prev = items.length - 1;
                setActive(prev);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (activeIndex >= 0 && activeIndex < items.length) {
                    var name = items[activeIndex].textContent;
                    selectCustomer(name);
                }
            } else if (e.key === 'Escape') {
                hideDropdown();
                this.blur();
            }
        });

        function positionProductDropdown(input) {
            var rect = input.getBoundingClientRect();
            var top = rect.bottom + 4;
            var left = rect.left;
            // 确保不超出屏幕
            var ddWidth = 200;
            if (left + ddWidth > window.innerWidth - 8) {
                left = window.innerWidth - ddWidth - 8;
            }
            if (left < 8) left = 8;
            productDropdownEl.style.top = top + 'px';
            productDropdownEl.style.left = left + 'px';
            productDropdownEl.style.minWidth = Math.max(rect.width, 120) + 'px';
        }

        function showProductDropdown(input) {
            currentProductInput = input;
            positionProductDropdown(input);
            var val = input.value;
            var matches = filterProducts(val);
            if (!val && matches.length === 0) {
                renderProductDropdown(PRODUCT_LIST.slice());
            } else {
                renderProductDropdown(matches.length > 0 ? matches : []);
                if (matches.length === 0 && !val) renderProductDropdown(PRODUCT_LIST.slice());
            }
            productDropdownEl.classList.add('show');
        }

        function hideProductDropdown() {
            productDropdownEl.classList.remove('show');
            productActiveIdx = -1;
            currentProductInput = null;
        }

        function setProductActive(index) {
            var items = productDropdownEl.querySelectorAll('li:not(.no-match)');
            for (var i = 0; i < items.length; i++) {
                items[i].classList.remove('active');
            }
            productActiveIdx = index;
            if (index >= 0 && index < items.length) {
                items[index].classList.add('active');
                items[index].scrollIntoView({ block: 'nearest' });
            }
        }

        function selectProduct(name) {
            if (currentProductInput) {
                currentProductInput.value = name;
                // Auto-fill remembered price for this product name
                var remembered = getRememberedPrice(name);
                if (remembered) {
                    var tr = currentProductInput.closest('tr');
                    if (tr) {
                        var priceInput = tr.querySelector('input[data-field="oprice"]');
                        if (priceInput && !priceInput.value) {
                            priceInput.value = remembered;
                        }
                    }
                }
                currentProductInput.dispatchEvent(new Event('input', { bubbles: true }));
                currentProductInput.dispatchEvent(new Event('change', { bubbles: true }));
            }
            hideProductDropdown();
            update();
        }

        // 为所有"其他"名称输入绑定事件
        function bindProductAutocomplete(input) {
            if (input._autocompleteBound) return;
            input._autocompleteBound = true;
            input.removeAttribute('list');

            input.addEventListener('focus', function() {
                showProductDropdown(this);
            });
            input.addEventListener('input', function() {
                var val = this.value;
                // Auto-fill remembered price when name is entered
                if (val) {
                    var remembered = getRememberedPrice(val.trim());
                    if (remembered) {
                        var tr = this.closest('tr');
                        if (tr) {
                            var priceInput = tr.querySelector('input[data-field="oprice"]');
                            if (priceInput && !priceInput.value) {
                                priceInput.value = remembered;
                            }
                        }
                    }
                }
                var matches = filterProducts(val);
                if (!val) {
                    renderProductDropdown(PRODUCT_LIST.slice());
                } else {
                    renderProductDropdown(matches);
                }
                if (currentProductInput === this) {
                    positionProductDropdown(this);
                    if (PRODUCT_LIST.length > 0 || val) {
                        productDropdownEl.classList.add('show');
                    }
                } else {
                    currentProductInput = this;
                    showProductDropdown(this);
                }
            });
            input.addEventListener('blur', function() {
                setTimeout(function() { hideProductDropdown(); }, 250);
            });
            input.addEventListener('keydown', function(e) {
                var items = productDropdownEl.querySelectorAll('li:not(.no-match)');
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (!productDropdownEl.classList.contains('show')) {
                        showProductDropdown(this);
                    }
                    var next = productActiveIdx + 1;
                    if (next >= items.length) next = 0;
                    setProductActive(next);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (!productDropdownEl.classList.contains('show')) {
                        showProductDropdown(this);
                    }
                    var prev = productActiveIdx - 1;
                    if (prev < 0) prev = items.length - 1;
                    setProductActive(prev);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (productActiveIdx >= 0 && productActiveIdx < items.length) {
                        var name = items[productActiveIdx].textContent;
                        selectProduct(name);
                    }
                } else if (e.key === 'Escape') {
                    hideProductDropdown();
                    this.blur();
                }
            });
        }

            const items = [];

            rows.forEach(tr => {
                const n = tr.querySelector('input[data-field="oname"]');
                const pc = tr.querySelector('input[data-field="opieces"]');
                const w = tr.querySelector('input[data-field="oweight"]');
                const p = tr.querySelector('input[data-field="oprice"]');
                const sp = tr.querySelector('input[type="checkbox"][data-field="ospecial"]');
                if (n) items.push({ name: n.value, pieces: pc?pc.value:'', weight: w?w.value:'', price: p?p.value:'', special: sp ? sp.checked : false });
            });
            return items;
        }
        function restoreOtherItems(items) {
            const rows = otherTbody.querySelectorAll('tr[data-other-idx]');
            items.forEach((item, i) => {
                if (i >= rows.length) return;
                const tr = rows[i];
                const n = tr.querySelector('input[data-field="oname"]');
                const pc = tr.querySelector('input[data-field="opieces"]');
                const w = tr.querySelector('input[data-field="oweight"]');
                const p = tr.querySelector('input[data-field="oprice"]');
                const sp = tr.querySelector('input[type="checkbox"][data-field="ospecial"]');
                if (n) n.value = item.name || '';
                if (pc) pc.value = item.pieces || '';
                if (w) w.value = item.weight || '';
                if (p) p.value = item.price || '';
                if (sp) sp.checked = !!item.special;
            });
        }

        // ===== Other dynamic rows =====
        function generateOtherRows(count) {
            count = Math.max(0, Math.min(count, MAX_OTHER));
            otherTbody.innerHTML = '';
            if (count === 0) {
                otherTableWrap.style.display = 'none';
                otherEmpty.style.display = 'block';
                return;
            }
            otherTableWrap.style.display = '';
            otherEmpty.style.display = 'none';
            for (let i = 0; i < count; i++) {
                const tr = document.createElement('tr');
                tr.setAttribute('data-other-idx', i);
                tr.innerHTML =
                    `<td><input type="number" step="1" min="0" data-field="opieces" data-oidx="${i}" placeholder="0" inputmode="numeric"></td>` +
                    `<td><input type="text" data-field="oname" data-oidx="${i}" placeholder="品名"></td>` +
                    `<td><input type="number" step="0.1" min="0" data-field="oweight" data-oidx="${i}" placeholder="0" inputmode="decimal"></td>` +
                    `<td><input type="number" step="0.01" min="0" data-field="oprice" data-oidx="${i}" placeholder="0.00" inputmode="decimal"></td>` +
                    `<td><label class="special-chk-wrap"><input type="checkbox" data-field="ospecial" data-oidx="${i}"><span class="chk-box"></span></label></td>` +
                    `<td><span class="result empty" id="res-amt-other-${i}">-</span></td>`;
                otherTbody.appendChild(tr);
            }
            // Bind listeners
            otherTbody.querySelectorAll('input').forEach(inp => {
                inp.addEventListener('input', update);
                inp.addEventListener('change', update);
                if (inp.getAttribute('data-field') === 'oname') {
                    bindProductAutocomplete(inp);
                }
            });
        }

        function calcOtherItem(idx) {
            const pcEl = otherTbody.querySelector(`input[data-field="opieces"][data-oidx="${idx}"]`);
            const wEl = otherTbody.querySelector(`input[data-field="oweight"][data-oidx="${idx}"]`);
            const pEl = otherTbody.querySelector(`input[data-field="oprice"][data-oidx="${idx}"]`);
            const pieces = pcEl ? (isNaN(parseInt(pcEl.value)) || parseInt(pcEl.value) < 0 ? null : parseInt(pcEl.value)) : null;
            const w = wEl ? (isNaN(parseFloat(wEl.value)) || parseFloat(wEl.value) < 0 ? null : parseFloat(wEl.value)) : null;
            const p = pEl ? (isNaN(parseFloat(pEl.value)) || parseFloat(pEl.value) < 0 ? null : parseFloat(pEl.value)) : null;
            const amt = (w !== null && p !== null) ? w * p : null;
            return { pieces, weight: w, price: p, amt, sum: amt };
        }

        function getOtherItems() {
            const items = [];
            const rows = otherTbody.querySelectorAll('tr[data-other-idx]');
            rows.forEach(tr => {
                const idx = parseInt(tr.getAttribute('data-other-idx'));
                const nameEl = tr.querySelector('input[data-field="oname"]');
                const name = nameEl ? nameEl.value.trim() : '';
                const spEl = tr.querySelector('input[type="checkbox"][data-field="ospecial"]');
                const special = spEl ? spEl.checked : false;
                const r = calcOtherItem(idx);
                items.push({ name, special, ...r });
            });
            return items;
        }

        function inputEl(row, field) { return document.querySelector(`input[data-row="${row}"][data-field="${field}"]`); }
        function val(row, field) { return inputEl(row, field).value; }
        function setVal(row, field, v) { inputEl(row, field).value = v; }
        function num(row, field) {
            const v = parseFloat(val(row, field));
            return isNaN(v) || v < 0 ? null : v;
        }
        function calc(row) {
            const pieces = numInt(row, 'pieces');
            const w = num(row, 'weight'), p = num(row, 'price');
            const amt = (w !== null && p !== null) ? w * p : null;
            const spChk = document.querySelector(`input[type="checkbox"][data-row="${row}"][data-field="special"]`);
            const special = spChk ? spChk.checked : false;
            return { pieces, weight: w, price: p, amt, sum: amt, special };
        }
        function numInt(row, field) {
            const v = parseInt(val(row, field));
            return isNaN(v) || v < 0 ? null : v;
        }

        function getGlobalLai() { const v = parseFloat(document.getElementById('inputLai').value); return isNaN(v) || v < 0 ? 0 : v; }
        function getGlobalQu()  { const v = parseFloat(document.getElementById('inputQu').value);  return isNaN(v) || v < 0 ? 0 : v; }
        function getGlobalLaiCount() { const v = parseInt(document.getElementById('inputLaiCount').value); return isNaN(v) || v < 0 ? 0 : v; }
        function getGlobalQuCount()  { const v = parseInt(document.getElementById('inputQuCount').value);  return isNaN(v) || v < 0 ? 0 : v; }
        function fmt(v) { return (v === null || v === undefined) ? '-' : v.toFixed(2); }

        // ===== Update display =====
        function update() {
            let gt = 0;
            // Fixed products
            ROWS.forEach(row => {
                const r = calc(row);
                const el = document.getElementById(`res-amt-${row}`);
                if (el) { el.textContent = fmt(r.amt); el.className = 'result' + (r.amt === null ? ' empty' : ''); }
                if (r.amt !== null) gt += r.amt;
            });
            // Other items
            const otherRows = otherTbody.querySelectorAll('tr[data-other-idx]');
            otherRows.forEach(tr => {
                const idx = parseInt(tr.getAttribute('data-other-idx'));
                const r = calcOtherItem(idx);
                const amtEl = document.getElementById('res-amt-other-' + idx);
                if (amtEl) { amtEl.textContent = fmt(r.amt); amtEl.className = 'result' + (r.amt === null ? ' empty' : ''); }
                if (r.amt !== null) gt += r.amt;
            });
            const lai = getGlobalLai();
            const qu = getGlobalQu();
            gt = gt - lai + qu;
            grandTotalEl.textContent = '¥' + fmt(gt);
            grandTotalEl.style.color = gt !== 0 ? 'var(--red)' : '#999';
            // Remember prices for each product
            ROWS.forEach(function(row) {
                var p = num(row, 'price');
                if (p !== null) rememberPrice(LABELS[row], p);
            });
            getOtherItems().forEach(function(r) {
                if (r.name && r.price !== null) rememberPrice(r.name, r.price);
            });
            saveData();
            if (receiptSection.style.display !== 'none') renderReceipt(receiptNormal, gt);
        }

        // ===== Build receipt HTML =====
        function buildReceipt(gt) {
            const fixedRows = ROWS.map(row => ({ label: LABELS[row], ...calc(row) }))
                               .filter(r => r.weight !== null || r.price !== null || r.pieces !== null);
            const otherItems = getOtherItems().filter(r => r.weight !== null || r.price !== null || r.pieces !== null);
            const dateStr = formatDate(dateInput.value);
            const customer = customerInput.value.trim();
            const marketName = marketInput.value.trim();

            // 筐子数据
            const quCount = getGlobalQuCount();
            const quAmt = getGlobalQu();
            const laiCount = getGlobalLaiCount();
            const laiAmt = getGlobalLai();

            let billHTML = '';
            const hasData = fixedRows.length > 0 || otherItems.length > 0;
            // 是否有任何果品填了件数
            const anyPieces = fixedRows.some(r => r.pieces !== null) || otherItems.some(r => r.pieces !== null);
            // 列数：有件数列5列，否则4列
            const totalCols = anyPieces ? 5 : 4;

            if (!hasData && quCount === 0 && laiCount === 0) {
                billHTML = '<div class="receipt-empty">暂无数据</div>';
            } else {
                let fruitTotal = 0;
                const allRows = [];

                // 件数列单元格（仅当 anyPieces 时显示）
                const piecesCell = (r) => anyPieces ? `<td class="num-col">${r.pieces !== null ? r.pieces : '-'}</td>` : '';

                // 水果行
                fixedRows.forEach(r => {
                    if (r.amt !== null) fruitTotal += r.amt;
                    const priceCell = r.price !== null
                        ? (r.special
                            ? `<span class="price-wrap">${r.price}<span class="special-badge">特价</span></span>`
                            : r.price)
                        : '-';
                    allRows.push(`<tr>
                        <td class="name-col">${r.label}</td>
                        ${piecesCell(r)}
                        <td class="num-col">${r.weight !== null ? r.weight : '-'}</td>
                        <td class="num-col">${priceCell}</td>
                        <td class="amt-col">${fmt(r.amt)}</td>
                    </tr>`);
                });

                // 其他水果行
                otherItems.forEach(r => {
                    if (r.amt !== null) fruitTotal += r.amt;
                    const priceCell = r.price !== null
                        ? (r.special
                            ? `<span class="price-wrap">${r.price}<span class="special-badge">特价</span></span>`
                            : r.price)
                        : '-';
                    allRows.push(`<tr>
                        <td class="name-col">${r.name || '其他'}</td>
                        ${piecesCell(r)}
                        <td class="num-col">${r.weight !== null ? r.weight : '-'}</td>
                        <td class="num-col">${priceCell}</td>
                        <td class="amt-col">${fmt(r.amt)}</td>
                    </tr>`);
                });

                // 货品合计 — moved to card footer bar, not inside table
                const fruitTotalFmt = fmt(fruitTotal);

                // 表头
                const piecesHead = anyPieces ? '<th class="h-center">件数</th>' : '';
                billHTML = `
                <div class="receipt-product-section">
                    <div class="receipt-product-header">📦 货品明细</div>
                    <table class="receipt-table">
                        <thead><tr>
                            <th class="h-left">货品</th>${piecesHead}<th class="h-center">重量</th><th class="h-center">单价</th><th class="h-right">小计</th>
                        </tr></thead>
                        <tbody>${allRows.join('')}</tbody>
                    </table>
                    <div class="receipt-product-total">货品合计：${fruitTotalFmt} 元</div>
                </div>`;

                // 去框/来框 section — clean card with flex rows, 押筐合计 at bottom right
                let frameHTML = '';
                if (quCount > 0 || laiCount > 0) {
                    let frameRows = '';
                    if (quCount > 0 && quAmt !== 0) {
                        frameRows += `<div class="receipt-frame-row">
                            <span class="frame-label">去框</span>
                            <span class="frame-detail">${quCount}个 × 30</span>
                            <span class="frame-amt">+${quAmt.toFixed(2)}</span>
                        </div>`;
                    }
                    if (laiCount > 0 && laiAmt !== 0) {
                        frameRows += `<div class="receipt-frame-row">
                            <span class="frame-label">来框</span>
                            <span class="frame-detail">${laiCount}个</span>
                            <span class="frame-amt">-${laiAmt.toFixed(2)}</span>
                        </div>`;
                    }
                    const basketNet = quAmt - laiAmt;
                    const sign = basketNet >= 0 ? '+' : '';
                    frameHTML = `
                <div class="receipt-frame-section">
                    <div class="receipt-frame-header">📦 框费明细</div>
                    ${frameRows}
                    <div class="receipt-frame-total">押筐合计：${sign}${basketNet.toFixed(2)} 元</div>
                </div>`;
                }
                billHTML += frameHTML;
            }

            // 客户行
            let customerHTML = '';
            if (customer) {
                customerHTML = `<span class="receipt-customer">客户：${customer}</span>`;
            } else {
                customerHTML = `<span class="receipt-customer"></span>`;
            }

            // 市场名
            const marketHTML = marketName ? `<div class="receipt-market-name">${marketName}</div>` : '';

            return `
            <div class="receipt">
                ${marketHTML}
                <div class="receipt-store-name">志强果业167号</div>
                <div class="receipt-info-row">
                    ${customerHTML}
                    <span class="receipt-code-date">${dateStr}</span>
                </div>
                <hr class="receipt-divider">
                ${billHTML}
                <div class="receipt-grand-total">本单合计：${fmt(gt)} 元</div>
                <hr class="receipt-divider">
                <div class="receipt-footer">
                    地址：${marketName ? marketName + '-' : ''}志强果业167号 &nbsp; <span class="footer-phone">手机：13502273897</span>
                </div>
            </div>`;
        }

        function renderReceipt(container, gt) {
            container.innerHTML = buildReceipt(gt);
        }

        // ===== Event: Generate Receipt =====
        function calcGrandTotal() {
            let gt = 0;
            ROWS.forEach(row => { const r = calc(row); if (r.amt !== null) gt += r.amt; });
            getOtherItems().forEach(r => { if (r.amt !== null) gt += r.amt; });
            return gt - getGlobalLai() + getGlobalQu();
        }

        btnGenerate.addEventListener('click', function() {
            const gt = calcGrandTotal();
            receiptSection.style.display = 'block';
            renderReceipt(receiptNormal, gt);
            setTimeout(() => {
                receiptSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        });

        // ===== Share Receipt =====
        async function shareReceipt() {
            var receiptEl = document.querySelector('#receiptNormal .receipt');
            if (!receiptEl) { showToast('请先生成收据'); return; }

            showToast('正在生成图片...');

            try {
                // Capture receipt as image using html2canvas
                var canvas = await html2canvas(receiptEl, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });

                // Convert to blob
                var blob = await new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
                var file = new File([blob], '收据_志强果业167号.png', { type: 'image/png' });

                // Try Web Share API
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: '志强果业167号 - 收据'
                    });
                    showToast('已分享');
                } else {
                    // Fallback: download image
                    downloadImage(blob);
                }
            } catch (err) {
                if (err && err.name === 'AbortError') return; // user cancelled
                console.error('Share failed:', err);
                // Fallback: try to download
                try {
                    var canvas2 = await html2canvas(receiptEl, {
                        scale: 2,
                        useCORS: true,
                        backgroundColor: '#ffffff',
                        logging: false
                    });
                    var blob2 = await new Promise(function(resolve) { canvas2.toBlob(resolve, 'image/png'); });
                    downloadImage(blob2);
                } catch (e2) {
                    showToast('分享失败，请截图分享');
                }
            }
        }

        function downloadImage(blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = '收据_志强果业167号.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
            showToast('图片已保存到相册');
        }

        // ===== Event: Share buttons =====
        var btnShare = document.getElementById('btnShare');
        if (btnShare) {
            btnShare.addEventListener('click', shareReceipt);
        }

        // ===== Event: Clear =====
        btnClear.addEventListener('click', async function() {
            const ok = await showConfirm('确定清空所有录入数据？');
            if (!ok) return;
            ROWS.forEach(row => { setVal(row,'pieces',''); setVal(row,'weight',''); setVal(row,'price', getRememberedPrice(LABELS[row])); });
            otherCountEl.value = '';
            generateOtherRows(0);
            document.getElementById('inputLai').value = '';
            document.getElementById('inputQu').value = '';
            document.getElementById('inputLaiCount').value = '';
            document.getElementById('inputQuCount').value = '';
            customerInput.value = '';
            // 清除所有特价勾选
            document.querySelectorAll('input[type="checkbox"][data-field="special"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('input[type="checkbox"][data-field="ospecial"]').forEach(cb => cb.checked = false);
            receiptSection.style.display = 'none';
            saveFormToOrder();
            persistOrders();
            update();
            showToast('已清空');
        });

        // ===== Input listeners =====
        // 特价复选框变更时刷新收据
        document.addEventListener('change', function(e) {
            var t = e.target;
            if (t && t.tagName === 'INPUT' && t.type === 'checkbox' && (t.hasAttribute('data-field') && (t.getAttribute('data-field') === 'special' || t.getAttribute('data-field') === 'ospecial'))) {
                update();
            }
        });

        document.querySelectorAll('input[data-row][data-field]').forEach(input => {
            input.addEventListener('input', update);
            input.addEventListener('change', update);
        });
        document.getElementById('inputLai').addEventListener('input', update);
        document.getElementById('inputLai').addEventListener('change', update);
        document.getElementById('inputQu').addEventListener('input', update);
        document.getElementById('inputQu').addEventListener('change', update);
        document.getElementById('inputLaiCount').addEventListener('input', update);
        document.getElementById('inputLaiCount').addEventListener('change', update);
        document.getElementById('inputQuCount').addEventListener('input', function() {
            const cnt = parseInt(this.value) || 0;
            document.getElementById('inputQu').value = cnt > 0 ? (cnt * 30).toFixed(2) : '';
            update();
        });
        document.getElementById('inputQuCount').addEventListener('change', function() {
            const cnt = parseInt(this.value) || 0;
            document.getElementById('inputQu').value = cnt > 0 ? (cnt * 30).toFixed(2) : '';
            update();
        });
        otherCountEl.addEventListener('input', function() {
            generateOtherRows(parseInt(this.value) || 0);
            update();
        });
        otherCountEl.addEventListener('change', function() {
            generateOtherRows(parseInt(this.value) || 0);
            update();
        });

        // ===== Toast =====
        let toastTimer;
        function showToast(msg) {
            clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
        }

        // ===== Confirm Dialog (custom, avoids native confirm() blocked on mobile) =====
        const confirmOverlay = document.getElementById('confirmOverlay');
        const confirmMsg = document.getElementById('confirmMsg');
        const confirmOk = document.getElementById('confirmOk');
        const confirmCancel = document.getElementById('confirmCancel');
        let confirmResolve = null;

        function showConfirm(msg) {
            return new Promise(function(resolve) {
                confirmResolve = resolve;
                confirmMsg.textContent = msg;
                confirmOverlay.classList.add('show');
            });
        }
        confirmOk.addEventListener('click', function() {
            confirmOverlay.classList.remove('show');
            if (confirmResolve) { confirmResolve(true); confirmResolve = null; }
        });
        confirmCancel.addEventListener('click', function() {
            confirmOverlay.classList.remove('show');
            if (confirmResolve) { confirmResolve(false); confirmResolve = null; }
        });
        // Tap overlay background to cancel
        confirmOverlay.addEventListener('click', function(e) {
            if (e.target === confirmOverlay) {
                confirmOverlay.classList.remove('show');
                if (confirmResolve) { confirmResolve(false); confirmResolve = null; }
            }
        });

        // ===== Init =====
        (function initOrders() {
            var saved = localStorage.getItem('zq_orders');
            if (saved) {
                try { orders = JSON.parse(saved); } catch(e) { orders = []; }
            }
            // Migrate from old single-order format
            if (!orders || orders.length === 0) {
                var oldData = localStorage.getItem('zq_data');
                var oldCustomer = localStorage.getItem('zq_customer') || '';
                var oldMarket = localStorage.getItem('zq_market') || '';
                var oldDate = localStorage.getItem('zq_date') || todayStr();
                var first = newOrderData();
                first.customer = oldCustomer;
                first.date = oldDate;
                marketInput.value = oldMarket;
                localStorage.setItem('zq_market', oldMarket);
                if (oldData) {
                    try {
                        var d = JSON.parse(oldData);
                        ROWS.forEach(function(row) { if (d[row]) first[row] = d[row]; });
                        first.otherCount = d._otherCount || '';
                        first.otherItems = d._otherItems || [];
                        first.lai = d._lai || '';
                        first.qu = d._qu || '';
                        first.laiCount = d._laiCount || '';
                        first.quCount = d._quCount || '';
                    } catch(e) {}
                }
                orders = [first];
                // Clean up old keys
                localStorage.removeItem('zq_data');
                localStorage.removeItem('zq_customer');
                localStorage.removeItem('zq_market');
                localStorage.removeItem('zq_date');
            }
            activeOrderId = localStorage.getItem('zq_activeOrderId');
            if (!activeOrderId || !getActiveOrder()) {
                activeOrderId = orders[0].id;
            }
            loadOrderToForm(getActiveOrder());
            persistOrders();
            renderTabs();
            // Bind static action buttons (always at top of order area)
            var addOrderBtn = document.getElementById('btnAddOrder');
            if (addOrderBtn) addOrderBtn.addEventListener('click', function() { addOrder(); });
            var clearAllBtn = document.getElementById('btnClearAll');
            if (clearAllBtn) clearAllBtn.addEventListener('click', function() { clearAllOrders(); });
        })();
        update();
    })();
    </script>
    <script>
    // 注册 Service Worker 实现离线使用（file:// 协议下跳过）
    if (window.location.protocol === 'file:') {
        console.log('[PWA] file:// 协议，跳过 Service Worker 注册');
    } else if ('serviceWorker' in navigator) {
        // 检测是否有旧 SW 控制，如有则先跳过注册（避免冲突）
        var hasOldSW = !!navigator.serviceWorker.controller;
        if (hasOldSW) {
            console.log('[PWA] 检测到旧 SW 控制中，跳过重新注册（将由浏览器自动更新）');
        }

        navigator.serviceWorker.register('sw.js?v=3')
            .then(function(reg) {
                console.log('[PWA] Service Worker 注册成功', reg.scope);
                // 检测更新
                reg.addEventListener('updatefound', function() {
                    var newWorker = reg.installing;
                    if (!newWorker) return;
                    newWorker.addEventListener('statechange', function() {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('[PWA] 检测到新版本！');
                            // 显示更新提示
                            var banner = document.createElement('div');
                            banner.id = 'sw-update-banner';
                            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a5632;color:#fff;padding:12px 16px;text-align:center;font-size:15px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);';
                            banner.innerHTML = '🔄 有新版本，点此立即更新';
                            banner.onclick = function() {
                                newWorker.postMessage({ action: 'skipWaiting' });
                                window.location.reload();
                            };
                            document.body.appendChild(banner);
                            // 3秒后自动更新
                            setTimeout(function() {
                                if (newWorker.state === 'installed') {
                                    newWorker.postMessage({ action: 'skipWaiting' });
                                    window.location.reload();
                                }
                            }, 3000);
                        }
                    });
                });
                // 监听 controllerchange — 新 SW 接管后自动刷新
                var refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', function() {
                    if (refreshing) return;
                    refreshing = true;
                    console.log('[PWA] 新 SW 已接管，刷新页面');
                    window.location.reload();
                });
            }).catch(function(err) {
                console.log('[PWA] Service Worker 注册失败（HTTP 下正常现象）:', err);
            });
    }
    </script>
